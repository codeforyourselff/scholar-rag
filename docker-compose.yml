services:
  postgres:
    image: postgres:16.2-alpine # why we use this specific version? Because it is the latest stable release as of June 2024, and alpine versions are smaller and more secure.
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: ${POSTGRES_INTERVAL}
      timeout: ${POSTGRES_TIMEOUT}
      retries: ${POSTGRES_RETRIES}
    deploy:
      resources:
        limits:
          cpus: ${POSTGRES_CPU_LIMIT}
          memory: ${POSTGRES_MEMORY_LIMIT}

  redis: 
    image: redis:7.2-alpine # why we use this specific version? According to redis open source documentation, this version provides license for commercial use. Alpine versions are smaller and more secure.
    container_name: redis_cache
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: ${REDIS_INTERVAL}
      timeout: ${REDIS_TIMEOUT}
      retries: ${REDIS_RETRIES}
    deploy:
      resources:
        limits:
          cpus: ${REDIS_CPU_LIMIT}
          memory: ${REDIS_MEMORY_LIMIT}
  qdrant:
    image: qdrant/qdrant:v1.17 # why we use this specific version ? not alpine ? as qdrant is build in rust and alpine generally use compiler gcc or c lang which is not compatible with rust, and also this version is the latest stable release as of June 2024.
    container_name: qdrant_vector_db
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT}:${QDRANT_PORT}" # REST / Web UI
      - "${QDRANT_GRPC_PORT}:${QDRANT_GRPC_PORT}" # gRPC (Use this in your backend code)
    volumes:
      - qdrant_data:/qdrant/storage
    deploy:
      resources:
        limits:
          cpus: ${QDRANT_CPU_LIMIT}
          memory: ${QDRANT_MEMORY_LIMIT}
  api:
    build: .
    env_file:
      - .env
    container_name: scholar_rag
    restart: unless-stopped
    ports:
      - "${FASTAPI_PORT}:${FASTAPI_PORT}"
    environment:
      POSTGRES__HOST: postgres
      REDIS__HOST: redis
      QDRANT__HOST: qdrant
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: ${FASTAPI_CPU_LIMIT}
          memory: ${FASTAPI_MEMORY_LIMIT}
volumes:
  pg_data:
  redis_data:
  qdrant_data: