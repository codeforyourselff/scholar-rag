version: '0.1'
services:
  postgres:
    image: postgres:16.2-alpine # why we use this specific version? Because it is the latest stable release as of June 2024, and alpine versions are smaller and more secure.
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redis: 
    image: redis:7.2-alpine # why we use this specific version? According to redis open source documentation, this version provides license for commercial use. Alpine versions are smaller and more secure.
    container_name: redis_cache
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
  qdrant:
    image: qdrant/qdrant:v1.17 # why we use this specific version ? not alpine ? as qdrant is build in rust and alpine generally use compiler gcc or c lang which is not compatible with rust, and also this version is the latest stable release as of June 2024.
    container_name: qdrant_vector_db
    restart: unless-stopped
    ports:
      - "6333:6333" # REST / Web UI
      - "6334:6334" # gRPC (Use this in your backend code)
    volumes:
      - qdrant_data:/qdrant/storage
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G # Vectors require significantly more memory than simple caching (In future, take an consideration by modifying this)
  fastapi:
    build: .
    container_name: scholar_rag
    restart: unless-stopped
    ports:
      - "${FASTAPI_PORT}:8000"
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
volumes:
  pg_data:
  redis_data:
  qdrant_data: